<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sigma Theme — VFX Demo</title>

    <!-- Sigma Color Tokens -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/background-vfx.css">
    <link rel="stylesheet" href="css/visualization.css">

    <style>
        /* ── CSS 변수 세팅 (앱에서는 JS로 제어) ── */
        :root {
            --sigma-vfx-bg-color: #0f0f17;
            --sigma-vfx-bg-opacity: 0.85;
            --sigma-vfx-opacity: 0.4;
            --sigma-vfx-blur: blur(40px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            color-scheme: dark;
            font-family: "Inter", "SF Pro Display", system-ui, -apple-system, sans-serif;
            color: #a9b1d6;
            background: #16161e;
            /* iPhone safe area */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ── Demo UI ── */
        .demo-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .demo-title {
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 700;
            color: #c0caf5;
            text-shadow: 0 0 30px rgba(122, 162, 247, 0.3);
            margin-bottom: 12px;
        }

        .demo-subtitle {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: #545f89;
            margin-bottom: 32px;
        }

        .demo-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            pointer-events: auto;
            padding: 0 16px;
        }

        .demo-btn {
            padding: 8px 16px;
            border: 1px solid rgba(122, 162, 247, 0.25);
            border-radius: 8px;
            background: rgba(22, 22, 30, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #a9b1d6;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .demo-btn.active {
            background: rgba(122, 162, 247, 0.2);
            border-color: #7aa2f7;
            color: #c0caf5;
        }

        .demo-btn:active {
            transform: scale(0.95);
        }

        /* ── Beacon Demo Row ── */
        .demo-beacons {
            display: flex;
            gap: 24px;
            margin-top: 40px;
            pointer-events: auto;
        }

        .demo-beacon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .demo-beacon-label {
            font-size: 10px;
            color: #545f89;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <!-- SVG noise filter -->
    <svg aria-hidden="true" style="position:absolute;width:0;height:0">
        <filter id="sigma-noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
        </filter>
    </svg>

    <!-- Layer 0: Base -->
    <div class="sigma-bg-base" aria-hidden="true"></div>

    <!-- Layer 1: VFX (JS로 교체) -->
    <div id="vfx-container"></div>

    <!-- Layer 2: Blur -->
    <div class="sigma-bg-blur" aria-hidden="true"></div>

    <!-- Demo UI -->
    <div class="demo-overlay">
        <div class="demo-title">Sigma Theme</div>
        <div class="demo-subtitle">Tap a preset to switch — works on iPhone Safari</div>

        <div class="demo-controls">
            <button class="demo-btn" data-preset="none">None</button>
            <button class="demo-btn active" data-preset="ambient_gradient">Gradient</button>
            <button class="demo-btn" data-preset="aurora">Aurora</button>
            <button class="demo-btn" data-preset="nebula">Nebula</button>
            <button class="demo-btn" data-preset="plasma">Plasma</button>
            <button class="demo-btn" data-preset="starfield">Starfield</button>
        </div>

        <!-- Signal Beacon Demo -->
        <div class="demo-beacons">
            <div class="demo-beacon-item">
                <span class="viz-beacon viz-beacon--normal">
                    <span class="viz-beacon__ring viz-beacon__ring--1"></span>
                    <span class="viz-beacon__ring viz-beacon__ring--2"></span>
                </span>
                <span class="demo-beacon-label">Connected</span>
            </div>
            <div class="demo-beacon-item">
                <span class="viz-beacon viz-beacon--warning">
                    <span class="viz-beacon__ring viz-beacon__ring--1"></span>
                    <span class="viz-beacon__ring viz-beacon__ring--2"></span>
                    <span class="viz-beacon__ring viz-beacon__ring--3"></span>
                    <span class="viz-beacon__ring viz-beacon__ring--4"></span>
                    <span class="viz-beacon__ring viz-beacon__ring--5"></span>
                </span>
                <span class="demo-beacon-label">Reconnecting</span>
            </div>
            <div class="demo-beacon-item">
                <span class="viz-beacon viz-beacon--critical">
                </span>
                <span class="demo-beacon-label">Disconnected</span>
            </div>
            <div class="demo-beacon-item">
                <span class="viz-beacon viz-beacon--alert">
                    <span class="viz-beacon__ring viz-beacon__ring--1"></span>
                    <span class="viz-beacon__ring viz-beacon__ring--2"></span>
                    <span class="viz-beacon__ring viz-beacon__ring--3"></span>
                </span>
                <span class="demo-beacon-label">Live</span>
            </div>
        </div>
    </div>

    <script>
        // ── VFX Preset Templates ──
        const PRESETS = {
            none: '',
            ambient_gradient: '<div class="sigma-bg-vfx sigma-bg-vfx--ambient-gradient" aria-hidden="true"></div>',
            aurora: `<div class="sigma-bg-vfx sigma-bg-vfx--aurora-orbs" aria-hidden="true">
                <div class="sigma-aurora-orb sigma-aurora-orb--blue"></div>
                <div class="sigma-aurora-orb sigma-aurora-orb--purple"></div>
                <div class="sigma-aurora-orb sigma-aurora-orb--cyan"></div>
            </div>`,
            nebula: `<div class="sigma-bg-vfx sigma-bg-vfx--nebula-drift" aria-hidden="true">
                <div class="sigma-nebula-patch sigma-nebula-patch--warm"></div>
                <div class="sigma-nebula-patch sigma-nebula-patch--cool"></div>
                <div class="sigma-nebula-patch sigma-nebula-patch--accent"></div>
            </div>`,
            plasma: `<div class="sigma-bg-vfx sigma-bg-vfx--plasma-waves" aria-hidden="true">
                <div class="sigma-plasma-wave sigma-plasma-wave--top"></div>
                <div class="sigma-plasma-wave sigma-plasma-wave--mid"></div>
                <div class="sigma-plasma-wave sigma-plasma-wave--bottom"></div>
            </div>`,
            starfield: `<div class="sigma-bg-vfx sigma-bg-vfx--starfield" aria-hidden="true">
                <div class="sigma-starfield-layer sigma-starfield-layer--near"></div>
                <div class="sigma-starfield-layer sigma-starfield-layer--far"></div>
            </div>`,
        };

        const container = document.getElementById('vfx-container');
        const buttons = document.querySelectorAll('.demo-btn');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                container.innerHTML = PRESETS[btn.dataset.preset] || '';
            });
        });

        // 초기 프리셋 적용
        container.innerHTML = PRESETS.ambient_gradient;
    </script>
</body>

</html>
