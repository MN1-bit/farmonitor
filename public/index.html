<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f14">
  <title>농도원 farmonitor_v1.0</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Sigma Theme CSS (order matters) -->
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="aurora-vfx.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- SVG Noise Filter (색상 밴딩 방지) -->
  <svg aria-hidden="true" style="position:absolute;width:0;height:0">
    <filter id="sigma-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
    </filter>
  </svg>

  <!-- Layer 0: Dark Base -->
  <div class="sigma-bg-base" aria-hidden="true"></div>

  <!-- Layer 1: Aurora Orbs VFX -->
  <div class="sigma-bg-vfx sigma-bg-vfx--aurora-orbs" aria-hidden="true">
    <div class="sigma-aurora-orb sigma-aurora-orb--blue"></div>
    <div class="sigma-aurora-orb sigma-aurora-orb--purple"></div>
    <div class="sigma-aurora-orb sigma-aurora-orb--cyan"></div>
  </div>

  <!-- Layer 2: Frosted Glass Blur -->
  <div class="sigma-bg-blur" aria-hidden="true"></div>

  <!-- App Content (z-index 2) -->
  <div id="app">
    <header>
      <h1>농도원 farmonitor_v1.0</h1>
      <p id="last-updated" class="last-updated">마지막: -</p>
      <div id="monitor-status" class="status-bar"></div>
    </header>

    <main>
      <!-- 월 선택 (다중 선택) -->
      <section class="card">
        <h2>📅 모니터링 대상 월</h2>
        <p class="section-hint">탭하여 모니터링할 월을 선택/해제하세요</p>
        <div id="month-grid" class="month-grid"></div>
      </section>

      <!-- 예약 캘린더 (선택된 모든 월 표시) -->
      <section class="card">
        <h2>🗓️ 예약 현황</h2>
        <div id="calendar-view"></div>
        <div class="actions">
          <a id="btn-tg-shortcut" href="#" target="_blank" class="btn-primary telegram-link">📱 텔레그램</a>
          <button id="btn-push-toggle" class="btn-primary">🔔 푸시알림 켜기</button>
        </div>
        <p class="input-hint" style="margin-top:8px;text-align:center">알림을 등록하면 취소 물량 발생 시 즉시 알려드립니다</p>
      </section>

      <!-- 변경 이력 -->
      <section class="card">
        <div class="section-header">
          <h2>📜 변경 이력</h2>
          <button id="btn-full-log" class="btn-secondary btn-xs">Full Log</button>
        </div>
        <div id="history-list"></div>
        <div id="server-log" class="server-log" style="display:none"></div>
      </section>

      <!-- 텔레그램 상태 -->
      <section class="card">
        <h2>📱 텔레그램 상태</h2>
        <div id="telegram-connect">
          <p id="telegram-status" class="connect-status"></p>
          <div class="telegram-actions">
            <a id="btn-telegram-connect" href="#" target="_blank" class="btn-secondary telegram-link">
              💬 봇 채팅 열기
            </a>
            <button id="btn-telegram-test" class="btn-secondary" disabled>테스트 메시지</button>
            <button id="btn-mock-alert" class="btn-secondary">Mock 알림</button>
          </div>
        </div>
      </section>

      <!-- 푸시 알림 상태 -->
      <section class="card">
        <h2>🔔 푸시 알림 상태</h2>
        <p id="push-status" class="connect-status"></p>
        <button id="btn-push-test" class="btn-secondary">푸시 테스트</button>
        <p class="input-hint" style="margin-top:8px">홈 화면에 추가하면 앱을 닫아도 알림을 받을 수 있습니다 (iOS 16.4+)</p>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>

</html>
